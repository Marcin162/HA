esphome:
  name: "esphome-kotlownia_01"

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:

ota:
 - platform: esphome

wifi:
  ssid:    !secret wifi_ssid
  password:     !secret wifi_password



#captive_portal:
one_wire:
  - platform: gpio
    pin: GPIO13
#    update_interval: 30s

sensor:
  - platform: dallas_temp
    #index: 0
    address: 0xe20822209e4dda28
    name: "Temperatura kotła"
    filters:
      - offset: -0.0


# Same as before:
  - platform: adc
    id: source_sensor
    attenuation: 12db
    pin: GPIO32
    update_interval: never

  - platform: adc
    id: source_sensor_boiler
    attenuation: 12db
    pin: GPIO35
    update_interval: never

  - platform: adc
    id: source_sensor_grzejniki
    attenuation: 12db
    pin: GPIO33
    update_interval: never

  - platform: adc
    id: source_sensor_podlogowka_powrot
    attenuation: 12db
    pin: GPIO34
    update_interval: never

  - platform: adc
    id: source_sensor_grzejniki_powrot
    attenuation: 12db
    pin: GPIO39
    update_interval: never  

  - platform: resistance
    sensor: source_sensor
    configuration: UPSTREAM #DOWNSTREAM
    resistor: 10kOhm
    name: Resistance Sensor
    id: resistance_sensor

  - platform: resistance
    sensor: source_sensor_boiler
    configuration: UPSTREAM #DOWNSTREAM
    resistor: 10kOhm
    name: Resistance Sensor Boiler
    id: resistance_sensor_boiler

  - platform: resistance
    sensor: source_sensor_grzejniki
    configuration: UPSTREAM #DOWNSTREAM
    resistor: 10kOhm
    name: Resistance Sensor Grzejniki
    id: resistance_sensor_grzejniki
    
  - platform: resistance
    sensor: source_sensor_podlogowka_powrot
    configuration:   UPSTREAM   #DOWNSTREAM
    resistor: 10kOhm
    name: Resistance Sensor Podlogowka Powrot
    id: resistance_sensor_podlogowka_powrot

  - platform: resistance
    sensor: source_sensor_grzejniki_powrot
    configuration:   UPSTREAM   #DOWNSTREAM
    resistor: 10kOhm
    name: Resistance Sensor Grzejniki Powrot
    id: resistance_sensor_grzejniki_powrot


  - platform: ntc
    sensor: resistance_sensor
    calibration:
      b_constant: 3850
      reference_temperature: 25°C
      reference_resistance: 10kOhm
    name: Rozdzielacz Podłogówki Zasulanie 1
    filters:
      - median:
         window_size: 7
         send_every: 4
         send_first_at: 3

  - platform: ntc
    sensor: resistance_sensor_boiler
    calibration:
      b_constant: 3850
      reference_temperature: 25°C
      reference_resistance: 10kOhm
    name: Temperatura Boiler NTC kruciec
    filters:
      - median:
         window_size: 7
         send_every: 4
         send_first_at: 3  

  - platform: ntc
    sensor: resistance_sensor_grzejniki
    calibration:
      b_constant: 3850
      reference_temperature: 25°C
      reference_resistance: 10kOhm
    name: Rozdzielacz Grzejniki Zasulanie 
    filters:
      - median:
         window_size: 7
         send_every: 4
         send_first_at: 3     

  - platform: ntc
    sensor: resistance_sensor_podlogowka_powrot
    calibration:
      b_constant: 3850
      reference_temperature: 25°C
      reference_resistance: 10kOhm
    name: Rozdzielacz Podlogowka Powrot
    filters:
      - median:
         window_size: 7
         send_every: 4
         send_first_at: 3  

  - platform: ntc
    sensor: resistance_sensor_grzejniki_powrot
    calibration:
      b_constant: 3850
      reference_temperature: 25°C
      reference_resistance: 10kOhm
    name: Rozdzielacz Grzejniki Powrot
    filters:
      - median:
         window_size: 7
         send_every: 4
         send_first_at: 3
  - platform: wifi_signal
    name: "WiFi Signal Sensor Kotłownia"
    update_interval: 60s     

  - platform: duty_time
    id: czas_pracy_pompy_glebinowej
    name: "Czas pracy pompy glebinowej"
    sensor: studnia
    restore: false
    last_time:
      name: "Czas ostatniego uruchomienia pompy"


switch:
  - platform: gpio
    pin: GPIO22
    id: ntc_vcc
  - platform: gpio
    pin: GPIO25
    id: ntc_vcc_2
  - platform: gpio
    pin: GPIO23
    id: ntc_vcc_3
  - platform: gpio
    pin: GPIO05
    id: ntc_vcc_4
  - platform: gpio
    pin: GPIO18
    id: ntc_vcc_5
  - platform: gpio
    pin: 
      number: 27
    id: switch_studnia
    name: Zasilanie czujnik
    


binary_sensor:
    - platform: gpio
      pin: 
       number: 26
       mode:                 
         input: true
         #pullup: true 
         pulldown: true
      name: Studnia
      id: studnia



interval:
  - interval: 10s
    then:
      - switch.turn_on: ntc_vcc
      - component.update: source_sensor
      - switch.turn_off: ntc_vcc
      - switch.turn_on: ntc_vcc_2
      - component.update: source_sensor_boiler
      - switch.turn_off: ntc_vcc_2
      - switch.turn_on: ntc_vcc_3
      - component.update: source_sensor_grzejniki
      - switch.turn_off: ntc_vcc_3
      - switch.turn_on: ntc_vcc_4
      - component.update: source_sensor_podlogowka_powrot
      - switch.turn_off: ntc_vcc_4
      - switch.turn_on: ntc_vcc_5
      - component.update: source_sensor_grzejniki_powrot
      - switch.turn_off: ntc_vcc_5


