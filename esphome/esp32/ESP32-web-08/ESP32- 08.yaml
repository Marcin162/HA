esphome:
  name: esphome-web-f39d08
  friendly_name: ESPHome Gabinet
  on_boot:
     - priority: -100
       then:
         - wait_until: api.connected
         - delay: 2s



esp32:
  board: esp32dev
  framework: 
    type: esp-idf # arduino                          #      esp-idf        

# Enable logging
logger:
  #baud_rate: 0
# Enable Home Assistant API
api:
  encryption:
    key: !secret key

ota:
  - platform: esphome

wifi:

  ssid: "TP-Link_C762"
  password: "12835096"

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esphome-Web-F39D08"


captive_portal:

sun:
  latitude: !secret latitude
  longitude:   !secret longitude
 
output:
  - platform: ledc
    id: output_led_1
    pin: GPIO27

  - platform: ledc
    id: output_led_2
    pin: GPIO26

light:
  - platform: monochromatic
    name: "Statek_rufa"
    id: statek_rufa
    output: output_led_1
    effects:
      - pulse:
          name: "Wolne Przyciemnianie"
          transition_length: 10s
          update_interval: 3s
          min_brightness: 10%
          max_brightness: 100%  

      - pulse:
          name: "Szybkie miganie"
          transition_length: 2s
          update_interval: 1s
          min_brightness: 10%
          max_brightness: 100%   

      - random:
          name: "Efekt losowy"
          transition_length: 3s
          update_interval: 5s   

      - flicker:
          name: "Migotanie"
          alpha: 75%
          intensity: 5%

  - platform: monochromatic
    name: "Statek_maszt"
    output: output_led_2
    id: statek_maszt
    effects:
      - pulse:
          name: "Wolne Przyciemnianie"
          transition_length: 10s
          update_interval: 3s
          min_brightness: 10%
          max_brightness: 100%  

      - pulse:
          name: "Szybkie miganie"
          transition_length: 2s
          update_interval: 1s
          min_brightness: 10%
          max_brightness: 100%   

      - random:
          name: "Efekt losowy"
          transition_length: 3s
          update_interval: 5s   

      - flicker:
          name: "Migotanie"
          alpha: 75%
          intensity: 5%

time:
  - platform: homeassistant
    

switch:
  - platform: gpio
    pin: 
      number: GPIO05
      inverted: false
      #mode: 
        #pullup: true
        #drive_strength: 5mA    
    name: "Czujnik szarości"
    id: czujnik_swiatla
    

  - platform: gpio
    pin:
      number: GPIO14
      inverted: true 
      mode: 
        output: true
        pullup: true
      drive_strength: 5mA
    
    name: "Oświetlenie Led półka"
    
    id: oswietlenie_led_polka
    
  - platform: gpio
    pin: 
      number: GPIO19
      inverted: false
      #mode: 
       # output: True
       # pullup: True
      #drive_strength: 5mA    
    #name: "Tem_akwarium"
    id: Akwarium 

  - platform: ld2410
    engineering_mode:
      name: Engineering Mode
    bluetooth:
      name: Control Bluetooth

uart:
  id: ld2410_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

ld2410:
  uart_id: ld2410_uart
  
number:
  - platform: ld2410
    timeout:
      name: Timeout
    light_threshold:
      name: Light Threshold
    max_move_distance_gate:
      name: Max Move Distance Gate
    max_still_distance_gate:
      name: Max Still Distance Gate
    g0:
      move_threshold:
        name: g0 move threshold
      still_threshold:
        name: g0 still threshold
    g1:
      move_threshold:
        name: g1 move threshold
      still_threshold:
        name: g1 still threshold
    g2:
      move_threshold:
        name: g2 move threshold
      still_threshold:
        name: g2 still threshold
    g3:
      move_threshold:
        name: g3 move threshold
      still_threshold:
        name: g3 still threshold
    g4:
      move_threshold:
        name: g4 move threshold
      still_threshold:
        name: g4 still threshold
    g5:
      move_threshold:
        name: g5 move threshold
      still_threshold:
        name: g5 still threshold
    g6:
      move_threshold:
        name: g6 move threshold
      still_threshold:
        name: g6 still threshold
    g7:
      move_threshold:
        name: g7 move threshold
      still_threshold:
        name: g7 still threshold
    g8:
      move_threshold:
        name: g8 move threshold
      still_threshold:
        name: g8 still threshold
select:
  - platform: ld2410
    distance_resolution:
      name: Distance Resolution
    baud_rate:
      name: Baud Rate
    light_function:
      name: Light Function
    out_pin_level:
      name: Out Pin Level

binary_sensor:
  - platform: gpio
    pin: GPIO21
    name: Wykrycie człowieka
    id: wykrycie_czlowieka
    

  - platform: ld2410
    has_target:
      name: Presence
      id: presence_cz
    has_moving_target:
      name: Moving Target
    has_still_target:
      name: Still Target
    out_pin_presence_status:
      name: Out Pin Presence Status


  - platform: status
    name: API Connection
    id: api_connection
    filters:
     - delayed_on: 1s




sensor:
  - platform: ld2410
    light:
      name: Light
    moving_distance:
      name: Moving Distance
    still_distance:
      name: Still Distance
    moving_energy:
      name: Move Energy
    still_energy:
      name: Still Energy
    detection_distance:
      name: Detection Distance
    g0:
      move_energy:
        name: g0 move energy
      still_energy:
        name: g0 still energy
    g1:
      move_energy:
        name: g1 move energy
      still_energy:
        name: g1 still energy
    g2:
      move_energy:
        name: g2 move energy
      still_energy:
        name: g2 still energy
    g3:
      move_energy:
        name: g3 move energy
      still_energy:
        name: g3 still energy
    g4:
      move_energy:
        name: g4 move energy
      still_energy:
        name: g4 still energy
    g5:
      move_energy:
        name: g5 move energy
      still_energy:
        name: g5 still energy
    g6:
      move_energy:
        name: g6 move energy
      still_energy:
        name: g6 still energy
    g7:
      move_energy:
        name: g7 move energy
      still_energy:
        name: g7 still energy
    g8:
      move_energy:
        name: g8 move energy
      still_energy:
        name: g8 still energy
  - platform: sun
    name: Sun Elevation
    type: elevation
  - platform: sun
    name: Sun Azimuth
    type: azimuth   

  - platform: adc
    id: swiatlo_sensor
    attenuation: 11db
    pin: GPIO32 
    name: "Czujnik światła Gabinet"                                   #GPIO05  D25
    samples: 10
    update_interval: 1s  
    accuracy_decimals: 3  
    device_class: illuminance
    unit_of_measurement: "lx"
    filters:
      
      # Używamy Twoich trzech punktów pomiarowych do stworzenia krzywej
      - calibrate_polynomial:
          degree: 2
          datapoints:
          - 0.13 -> 0.0
          - 0.16 -> 120.0
          - 2.20 -> 1200.0
      # Filtr wygładzający, żeby wynik nie "skakał" przez szumy ADC
      
      - sliding_window_moving_average:
          window_size: 15
          send_every: 1


  - platform: adc
    id: source_sensor
    attenuation: 12db
    pin: GPIO35
    #raw: true
    #filters:
    #   - multiply: 3.3   #0.00095238 #3.9/4095, for  11db
    update_interval: never

  - platform: resistance
    sensor: source_sensor
    configuration: DOWNSTREAM  #     UPSTREAM
    resistor: 20kOhm
    name: Resytancja Akwarium
    id: resistance_sensor

    
  - platform: ntc
    sensor: resistance_sensor
    calibration:
      b_constant: 3435
      reference_temperature: 25°C
      reference_resistance: 10kOhm
    name: Teperatura Akwarium
    filters:
      - median:
         window_size: 7
         send_every: 4
         send_first_at: 3




button:
  - platform: ld2410
    factory_reset:
      name: Factory Reset
    restart:
      name: Restart
    query_params:
      name: Query Params
text_sensor:
  - platform: ld2410
    version:
      {name: Firmware Version}
    
    mac_address:
      {name: MAC}
    #out_pin_presence_status:
    #name: out pin presence status


interval:
  - interval: 10 s
    then:
     - switch.turn_on: Akwarium 
       #- delay: 100ms
     - component.update: source_sensor
     - switch.turn_off: Akwarium 
     - if: 
          condition:
             - sun.is_below_horizon: 
          then: 
            - if: 
                condition: 
                  - binary_sensor.is_on: presence_cz
                then:       
                 - light.turn_on: 
                     id: statek_rufa
                     brightness: 60%
                 - light.turn_on: 
                     id: statek_maszt
                     brightness: 60%
  
     - if: 
         condition:
            - sun.is_above_horizon: 
         then: 
           - light.turn_off: statek_maszt 
           - light.turn_off: statek_rufa   
     - if: 
         condition:
            - binary_sensor.is_off: presence_cz
         then:
            - light.turn_off: statek_maszt 
            - light.turn_off: statek_rufa 

            


esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 550ms
    active: true

bluetooth_proxy:
    active: true
    connection_slots: 3                


