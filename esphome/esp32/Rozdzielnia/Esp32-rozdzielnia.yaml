esphome:
  name: esphome-web-9a8488
  friendly_name: ESPHome Web Rozdzielnia

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret key

ota:
  - platform: esphome
  

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: !secret ap_ssid
    password: !secret ap_password

captive_portal:
sensor:
  
# Same as before:
  - platform: adc
    id: source_sensor
    attenuation: 12db
    pin: GPIO32
    update_interval: never

  - platform: adc
    id: source_sensor_2
    attenuation: 12db
    pin: GPIO33
    update_interval: never
  
  - platform: resistance
    sensor: source_sensor
    configuration:  DOWNSTREAM     #UPSTREAM
    resistor: 10kOhm
    name: Resistance Sensor Hol
    id: resistance_sensor

  - platform: resistance
    sensor: source_sensor_2
    configuration:  DOWNSTREAM  #UPSTREAM
    resistor: 10kOhm
    name: Resistance Sensor Korytarz
    id: resistance_sensor_2
  
  - platform: ntc
    sensor: resistance_sensor
    calibration:
      b_constant: 3850
      reference_temperature: 25°C
      reference_resistance: 10kOhm
    name: Temperatura Podlogi Hol
    filters:
      - median:
         window_size: 7
         send_every: 4
         send_first_at: 3

  - platform: ntc
    sensor: resistance_sensor_2
    calibration:
      b_constant: 3850
      reference_temperature: 25°C
      reference_resistance: 10kOhm
    name: Temperatura Podlogi Korytarz
    filters:
      - median:
         window_size: 7
         send_every: 4
         send_first_at: 3

  - platform: wifi_signal
    name: "WiFi Signal Sensor Rozdzielnia"
    update_interval: 60s     
 
switch:
  - platform: gpio
    pin: GPIO12
    id: ntc_vcc
  - platform: gpio
    pin: GPIO13
    id: ntc_vcc_2
  - platform: gpio
    pin: GPIO14
    id: czujnik_binarny
    name: "Czujnik Binarny"

binary_sensor:
  - platform: gpio
    pin: 
       number: GPIO27
       mode:
          input: true
          pulldown: True
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    name: "Światło w łazience"
    id: swiatlo_lazienka
    device_class: LIGHT       


interval:
  - interval: 10s
    then:
      - switch.turn_on: ntc_vcc
      - component.update: source_sensor
      - switch.turn_off: ntc_vcc
      - switch.turn_on: ntc_vcc_2
      - component.update: source_sensor_2
      - switch.turn_off: ntc_vcc_2
      






  
   