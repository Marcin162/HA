esphome:
  name: "esphome-web-gosnik"
  friendly_name: esp32-mic-speaker

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU0: y
      CONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU1: y

logger:
  level: DEBUG

api:

ota:
  - platform: esphome
    id: ota_esphome

wifi:
  ssid: "TP-Link_C762"
  password: "12835096"
  min_auth_mode: WPA2

  ap:
    ssid: "Esphome-Web-94D78C"
    password: "9aB6CCgJS0wi"

captive_portal:

button:
  - platform: safe_mode
    id: button_safe_mode
    name: Rozruch w trybie awaryjnym

  - platform: factory_reset
    id: factory_reset_btn
    name: Przywracanie ustawień fabrycznych

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin: GPIO23
    i2s_bclk_pin: GPIO19

  - id: i2s_in
    i2s_lrclk_pin: GPIO33
    i2s_bclk_pin: GPIO32

microphone:
  - platform: i2s_audio
    i2s_audio_id: i2s_in
    adc_type: external
    id: echo_microphone
    i2s_din_pin: GPIO35
    pdm: False
    channel: right
    bits_per_sample: 16
    sample_rate: 16000

speaker:
  - platform: i2s_audio
    id: hardware_speaker
    i2s_audio_id: i2s_audio_bus
    dac_type: external
    buffer_duration: 50ms
    i2s_dout_pin: GPIO22
    i2s_comm_fmt: stand_i2s
    use_apll: True

voice_assistant:
  id: va
  microphone: echo_microphone
  speaker: hardware_speaker
  use_wake_word: false

  on_listening:
    - logger.log: "Nasłuchiwanie rozpoczęte"

  on_stt_end:
    - logger.log: "Przetwarzanie"
    - switch.turn_off: use_wake_word

  on_tts_start:
    - logger.log: "Asystent odpowiada"

  on_end:
    - logger.log: "Rozmowa zakończona"

binary_sensor:
  - platform: status
    name: API Connection
    id: api_connection
    filters:
      - delayed_on: 1s

switch:
  - platform: template
    name: "Nasłuchiwanie asystenta"
    id: use_wake_word
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - voice_assistant.start
    on_turn_off:
      - voice_assistant.stop