esphome:
  name: "esphome-web-gosnik"
  friendly_name: esp32-mic-speaker

esp32:
  board: esp32dev
  framework:
    type: esp-idf          # ← zmień z arduino na esp-idf
    version: recommended

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:

ota:
  - platform: esphome
    id: ota_esphome

wifi:
  ssid: "TP-Link_C762"
  password: "12835096"
  min_auth_mode: WPA2

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esphome-Web-94D78C"
    password: "9aB6CCgJS0wi"

captive_portal:

button:
  - platform: safe_mode
    id: button_safe_mode
    name: Rozruch w trybie awaryjnym

  - platform: factory_reset
    id: factory_reset_btn
    name: Przywracanie ustawień fabrycznych

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin: GPIO23
    i2s_bclk_pin: GPIO19
  
  - id: i2s_in
    i2s_lrclk_pin: GPIO33
    i2s_bclk_pin: GPIO32 

microphone:
  - platform: i2s_audio
    i2s_audio_id: i2s_in
    adc_type: external
    id: echo_microphone
    i2s_din_pin: GPIO35
    pdm: False
    channel: right
    bits_per_sample: 16bit

# --- KOMPONENT GŁOŚNIKA I2S ---
speaker:
  - platform: i2s_audio
    
    id: hardware_speaker
    i2s_audio_id: i2s_audio_bus
    dac_type: external
    buffer_duration: 80ms
    i2s_dout_pin: GPIO22   # DIN 
    i2s_comm_fmt: stand_msb
    use_apll: True

 


      
  

# --- ZAKTUALIZOWANY KOMPONENT MEDIA PLAYER ---
   

voice_assistant:
  id: va
  microphone: echo_microphone
  speaker: hardware_speaker
  use_wake_word: false

  on_listening:
    - logger.log: "Nasłuchiwanie rozpoczęte "


  on_stt_end:
    - logger.log: "Przetwarzanie"
    - switch.turn_off: use_wake_word

  on_tts_start:
    - logger.log: "Asystent odpowiada "

  on_end:
    - logger.log: "Rozmowa zakończona"

binary_sensor:
  - platform: status
    name: API Connection
    id: api_connection
    filters:
      - delayed_on: 1s
    
switch:
  - platform: template
    name: "Nasłuchiwanie asystenta"
    id: use_wake_word
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - voice_assistant.start: 
    on_turn_off:
      - voice_assistant.stop: 

globals:
  - id: last_volume
    type: float
    restore_value: true
    initial_value: '0.7'        
      
number:
  - platform: template
    name: "Głośność głośnika"
    id: speaker_volume
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 70
    optimistic: true

    set_action:
      - globals.set:
          id: last_volume
          value: !lambda 'return x / 100.0;'

      - logger.log: "Głośność głośnika zmieniona"